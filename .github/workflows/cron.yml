name: Bot cron

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  tick:
    runs-on: ubuntu-latest
    steps:
      - name: Call cron endpoint
        run: |
          curl --fail-with-body --show-error \
            --request GET \
            --header "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.PUBLIC_BASE_URL }}/api/cron"
